<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Account</title>
    <style>
        :root {
            color-scheme: light dark;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f5f7fb;
            color: #18202f;
        }

        main {
            width: min(760px, calc(100vw - 32px));
            padding: 24px;
            border: 1px solid #d8dee9;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 12px 28px rgba(31, 41, 55, 0.12);
        }

        h1 {
            margin: 0 0 18px;
            font-size: 24px;
        }

        .mode {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
        }

        .mode button,
        form button {
            border: 0;
            border-radius: 6px;
            background: #e5e9f0;
            color: #18202f;
            cursor: pointer;
            font-weight: 700;
        }

        .mode button {
            padding: 9px 12px;
        }

        .mode button.active,
        form button {
            background: #1f7a5b;
            color: #ffffff;
        }

        form {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
        }

        input,
        select,
        textarea,
        pre {
            width: 100%;
            box-sizing: border-box;
            font: inherit;
        }

        input,
        select,
        textarea {
            padding: 10px 12px;
            border: 1px solid #c8d0dc;
            border-radius: 6px;
        }

        textarea {
            min-height: 72px;
            resize: vertical;
        }

        .wide {
            grid-column: 1 / -1;
        }

        form button {
            padding: 11px 14px;
        }

        form button:disabled {
            opacity: 0.65;
            cursor: wait;
        }

        pre {
            min-height: 112px;
            margin: 18px 0 0;
            padding: 12px;
            overflow: auto;
            border-radius: 6px;
            background: #111827;
            color: #e5e7eb;
            white-space: pre-wrap;
        }

        .links {
            margin-top: 14px;
        }

        .links a {
            display: inline-block;
            margin-right: 8px;
            color: #1f7a5b;
            font-weight: 700;
        }

        @media (max-width: 680px) {
            form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main>
    <h1>Create Account</h1>

    <div class="mode">
        <button id="donorMode" class="active" type="button">Donor</button>
        <button id="organizationMode" type="button">Organization</button>
    </div>

    <form id="registrationForm">
        <div>
            <label for="name">Name</label>
            <input id="name" name="name" required>
        </div>

        <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required>
        </div>

        <div>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="new-password">
        </div>

        <div data-donor-field>
            <label for="donorType">Donor Type</label>
            <select id="donorType" name="donorType">
                <option value="INDIVIDUAL">Individual</option>
                <option value="CORPORATE">Corporate</option>
                <option value="INSTITUTIONAL">Institutional</option>
            </select>
        </div>

        <div data-organization-field hidden>
            <label for="organizationType">Organization Type</label>
            <select id="organizationType" name="organizationType">
                <option value="NGO">NGO</option>
                <option value="RLO">RLO</option>
            </select>
        </div>

        <div class="wide" data-organization-field hidden>
            <label for="description">Pitch / Description</label>
            <textarea id="description" name="description" placeholder="Briefly describe your organization, who you serve, and why donors should support your work."></textarea>
        </div>

        <button id="submitButton" class="wide" type="submit">Register</button>
    </form>

    <pre id="result">Waiting for registration...</pre>
    <div id="accountLinks" class="links"></div>
</main>

<script>
    const form = document.getElementById("registrationForm");
    const donorModeButton = document.getElementById("donorMode");
    const organizationModeButton = document.getElementById("organizationMode");
    const button = document.getElementById("submitButton");
    const result = document.getElementById("result");
    const accountLinks = document.getElementById("accountLinks");
    let mode = "donor";

    donorModeButton.addEventListener("click", () => setMode("donor"));
    organizationModeButton.addEventListener("click", () => setMode("organization"));

    function setMode(nextMode) {
        mode = nextMode;
        donorModeButton.classList.toggle("active", mode === "donor");
        organizationModeButton.classList.toggle("active", mode === "organization");

        document.querySelectorAll("[data-donor-field]").forEach((field) => {
            field.hidden = mode !== "donor";
        });

        document.querySelectorAll("[data-organization-field]").forEach((field) => {
            field.hidden = mode !== "organization";
        });
    }

    form.addEventListener("submit", async (event) => {
        event.preventDefault();
        button.disabled = true;
        result.textContent = "Sending request...";

        const endpoint = mode === "donor"
            ? "/api/auth/register/donor"
            : "/api/auth/register/organization";

        const payload = mode === "donor" ? donorPayload() : organizationPayload();

        try {
            const response = await fetch(endpoint, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const text = await response.text();
            let body = text;
            let parsedBody = null;

            try {
                parsedBody = JSON.parse(text);
                body = JSON.stringify(parsedBody, null, 2);
            } catch (ignored) {
                body = text || "(empty response)";
            }

            if (response.ok) {
                saveCurrentUser(parsedBody);
                renderAccountLinks(parsedBody);
                window.location.href = "/main.html";
            }

            result.textContent = `HTTP ${response.status}\n\n${body}`;
        } catch (error) {
            result.textContent = error.message;
        } finally {
            button.disabled = false;
        }
    });

    function donorPayload() {
        return {
            name: field("name").value,
            email: field("email").value,
            password: field("password").value,
            donorType: field("donorType").value
        };
    }

    function organizationPayload() {
        return {
            name: field("name").value,
            contactEmail: field("email").value,
            password: field("password").value,
            organizationType: field("organizationType").value,
            description: field("description").value
        };
    }

    function field(name) {
        return form.elements[name];
    }

    function saveCurrentUser(responseBody) {
        if (responseBody && responseBody.id && responseBody.role) {
            localStorage.setItem("currentUser", JSON.stringify(responseBody));
        }
    }

    function renderAccountLinks(user) {
        if (!user || !user.role) {
            return;
        }

        if (user.role === "DONOR") {
            accountLinks.innerHTML = '<a href="/donor-account.html">Open My Account</a><a href="/organizations.html">Browse Organizations</a>';
            return;
        }

        if (user.role === "ORGANIZATION") {
            accountLinks.innerHTML = '<a href="/organization-projects.html">Open My Projects</a>';
        }
    }
</script>
</body>
</html>
