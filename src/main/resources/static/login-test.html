<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Test</title>
    <style>
        :root {
            color-scheme: light dark;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f5f7fb;
            color: #18202f;
        }

        main {
            width: min(420px, calc(100vw - 32px));
            padding: 24px;
            border: 1px solid #d8dee9;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 12px 28px rgba(31, 41, 55, 0.12);
        }

        h1 {
            margin: 0 0 20px;
            font-size: 24px;
        }

        label {
            display: block;
            margin: 14px 0 6px;
            font-weight: 700;
        }

        input,
        button,
        pre {
            width: 100%;
            box-sizing: border-box;
            font: inherit;
        }

        input {
            padding: 10px 12px;
            border: 1px solid #c8d0dc;
            border-radius: 6px;
        }

        button {
            margin-top: 18px;
            padding: 11px 14px;
            border: 0;
            border-radius: 6px;
            background: #1f7a5b;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.65;
            cursor: wait;
        }

        pre {
            min-height: 96px;
            margin: 18px 0 0;
            padding: 12px;
            overflow: auto;
            border-radius: 6px;
            background: #111827;
            color: #e5e7eb;
            white-space: pre-wrap;
        }

        .links {
            margin-top: 14px;
        }

        .links a {
            display: inline-block;
            margin-right: 8px;
            color: #1f7a5b;
            font-weight: 700;
        }
    </style>
</head>
<body>
<main>
    <h1>Login Test</h1>
    <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password">

        <button id="submitButton" type="submit">Login</button>
    </form>

    <pre id="result">Waiting for login...</pre>
    <div id="accountLinks" class="links"></div>
</main>

<script>
    const form = document.getElementById("loginForm");
    const button = document.getElementById("submitButton");
    const result = document.getElementById("result");
    const accountLinks = document.getElementById("accountLinks");

    form.addEventListener("submit", async (event) => {
        event.preventDefault();
        button.disabled = true;
        result.textContent = "Sending request...";

        const payload = {
            email: form.email.value,
            password: form.password.value
        };

        try {
            const response = await fetch("/api/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const text = await response.text();
            let body = text;
            let parsedBody = null;

            try {
                parsedBody = JSON.parse(text);
                body = JSON.stringify(parsedBody, null, 2);
            } catch (ignored) {
                body = text || "(empty response)";
            }

            if (response.ok && parsedBody && parsedBody.id && parsedBody.role) {
                localStorage.setItem("currentUser", JSON.stringify(parsedBody));
                renderAccountLinks(parsedBody);
                window.location.href = "/main.html";
            }

            result.textContent = `HTTP ${response.status}\n\n${body}`;
        } catch (error) {
            result.textContent = error.message;
        } finally {
            button.disabled = false;
        }
    });

    function renderAccountLinks(user) {
        if (user.role === "DONOR") {
            accountLinks.innerHTML = '<a href="/donor-account.html">Open My Account</a><a href="/organizations.html">Browse Organizations</a>';
            return;
        }

        if (user.role === "ORGANIZATION") {
            accountLinks.innerHTML = '<a href="/organization-projects.html">Open My Projects</a>';
        }
    }
</script>
</body>
</html>
