spring.application.name=demo

# AI Grant-Writing Co-Pilot (Anthropic).
# The key is read from the ANTHROPIC_API_KEY environment variable and is NEVER
# committed. If unset, the co-pilot runs in graceful offline-fallback mode.
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.model=claude-sonnet-4-6
