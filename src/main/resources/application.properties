spring.application.name=demo
# 1. Database Connection (Using your file-based H2)
spring.datasource.url=jdbc:h2:file:./data/mydb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# 2. Tell Hibernate to automatically create/update the tables on startup
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# 3. CRITICAL FIX: Force Spring Boot to wait for Hibernate to create tables before running data.sql
spring.jpa.defer-datasource-initialization=true
